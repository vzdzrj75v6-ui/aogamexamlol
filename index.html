<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ENGINE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="matrix"></canvas>

<div class="app">

<div class="header">

ENGINE

</div>

<div id="login" class="glass">

<input id="key" placeholder="Enter Key">

<button onclick="login()">LOGIN</button>

</div>

<div id="profile" class="glass hidden">

<div class="title">PROFILE</div>

<div id="user"></div>

<div id="expire"></div>

</div>

<div id="engine" class="glass hidden">

<div class="title">ENGINE</div>

<textarea id="code"></textarea>

<button onclick="runEngine()" class="run">RUN ENGINE</button>

<button onclick="openGame()" class="game">OPEN GAME</button>

</div>

<div id="loader" class="hidden">

<div class="ring"></div>

</div>

</div>

<script src="matrix.js"></script>
<script src="engine.js"></script>

</body>

</html>
